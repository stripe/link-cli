name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run build

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          title: 'Version Packages'
          commit: 'Version Packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload built CLI to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(echo '${{ steps.changesets.outputs.publishedPackages }}' \
            | jq -r '.[] | select(.name == "@stripe/link-cli") | "@stripe/link-cli@" + .version')
          if [ -n "$TAG" ]; then
            sha256sum packages/cli/dist/cli.js > packages/cli/dist/cli.js.sha256
            gh release upload "$TAG" packages/cli/dist/cli.js packages/cli/dist/cli.js.sha256 --clobber
          fi

  build-sea:
    needs: release
    if: needs.release.outputs.published == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: link-cli-linux-x64
          - os: macos-latest
            asset_name: link-cli-macos-arm64
          - os: windows-latest
            asset_name: link-cli-win-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26        # ← required for mainFormat: module + --build-sea
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
      - run: cp packages/cli/dist/cli.js packages/cli/dist/cli.mjs

      - name: Build SEA
        run: node --build-sea packages/cli/sea-config.json

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv sea-output ${{ matrix.asset_name }} && chmod +x ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Rename-Item sea-output ${{ matrix.asset_name }}

      - name: Sign binary (macOS only)
        if: runner.os == 'macOS'
        run: codesign --sign - ${{ matrix.asset_name }}

      - name: Generate checksum (Unix)
        if: runner.os != 'Windows'
        run: sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-FileHash ${{ matrix.asset_name }} -Algorithm SHA256 | Select-Object -ExpandProperty Hash > ${{ matrix.asset_name }}.sha256

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(echo '${{ needs.release.outputs.publishedPackages }}' \
            | jq -r '.[] | select(.name == "@stripe/link-cli") | "@stripe/link-cli@" + .version')
          gh release upload "$TAG" \
            ${{ matrix.asset_name }} \
            ${{ matrix.asset_name }}.sha256 \
            --clobber